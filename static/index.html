<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>RocketRide + Linkup Chat</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px 100px;
    background: #0f1115;
    color: #e6e6e6;
  }
  h1 { font-size: 18px; font-weight: 600; color: #9aa4b2; margin-bottom: 4px; }
  p.sub { color: #6b7280; font-size: 13px; margin-top: 0; margin-bottom: 24px; }
  #messages { display: flex; flex-direction: column; gap: 12px; }
  .msg { padding: 12px 14px; border-radius: 12px; line-height: 1.45; font-size: 14px; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #2563eb; color: white; max-width: 80%; }
  .msg.agent { align-self: flex-start; background: #1c1f26; border: 1px solid #2a2e37; max-width: 85%; }
  .msg.pending { opacity: 0.6; font-style: italic; }
  form {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; gap: 8px;
    padding: 16px; background: #0f1115; border-top: 1px solid #2a2e37;
  }
  input {
    flex: 1; padding: 12px 14px; border-radius: 10px; border: 1px solid #2a2e37;
    background: #1c1f26; color: #e6e6e6; font-size: 14px; max-width: 720px; margin: 0 auto;
  }
  form { justify-content: center; }
  input:focus { outline: 2px solid #2563eb; }
  button {
    padding: 12px 18px; border-radius: 10px; border: none;
    background: #2563eb; color: white; font-size: 14px; cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
  <h1>RocketRide + Linkup</h1>
  <p class="sub">Grounded chat agent — every factual answer is cited to a live source URL.</p>
  <div id="messages"></div>

  <form id="chat-form">
    <input id="input" type="text" placeholder="Ask something..." autocomplete="off" autofocus />
    <button id="send" type="submit">Send</button>
  </form>

  <script>
    const messagesEl = document.getElementById('messages');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      window.scrollTo(0, document.body.scrollHeight);
      return div;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, 'user');
      input.value = '';
      input.disabled = true;
      sendBtn.disabled = true;

      const pending = addMessage('Thinking…', 'agent pending');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });
        const data = await res.json();
        pending.textContent = data.answer;
        pending.classList.remove('pending');
      } catch (err) {
        pending.textContent = 'Error: ' + err.message;
        pending.classList.remove('pending');
      } finally {
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
